            <template data-page="1">
              <div class="p-letter">
                <p>Mi amor,</p>
                <p>no sé cómo poner en palabras todo lo que siento por ti, porque siento que ninguna es suficiente para describir lo mucho que te amo.</p>
                <p>Llegaste a mi vida de una forma tan bonita que, sin darme cuenta, te convertiste en mi lugar seguro, en la persona que alegra mis días y calma mi corazón incluso estando lejos.</p>
                <p>Gracias por cada detalle, por cada mensaje, por hacerme sentir querida y por demostrarme que el amor también se construye con paciencia, respeto y cariño.</p>
              </div>
            </template>

            <template data-page="2">
              <div class="p-letter">
                <p>No sabes lo feliz que soy de tenerte, y si algún día llegas a dudar de cuánto significas para mí, quiero que recuerdes esto: te elegiría una y otra vez, en cualquier momento y en cualquier lugar.</p>
                <p>Eres una de las personas más especiales que han llegado a mi vida y prometo cuidar de tu corazón como tú has cuidado del mío.</p>
                <p>Te amo más de lo que las palabras pueden explicar, mi amor, y espero que nunca olvides que siempre tendrás un hogar en mi corazón.</p>
                <p class="p-signature">&mdash; Con todo mi amor, Valeria</p>
              </div>
            </template>

            <template data-page="3">
              <div class="p-letter">
                <p>&mdash; Lo que veo en ti &mdash;</p>
                <p>A veces me pregunto si de verdad sabes todo lo que veo cuando pienso en ti. No es solo que me parezcas hermosa, aunque lo eres, sino que hay algo en tu forma de ser que me hace admirarte cada día un poco más.</p>
                <p>Me gusta la manera en que hablas, cómo ves las cosas y cómo consigues que una conversación cualquiera termine siendo uno de los mejores momentos de mi día. Contigo todo se siente más ligero, como si por un rato el resto del mundo dejara de importar.</p>
                <p>Me gusta que seas tú, sin intentar parecer alguien más, porque justamente esa autenticidad fue lo que hizo que empezara a fijarme en ti.</p>
              </div>
            </template>

            <template data-page="4">
              <div class="p-letter">
                <p>Hay personas que llegan y pasan sin dejar mucho, pero contigo fue diferente. Poco a poco te fuiste convirtiendo en alguien que ocupa un lugar muy importante en mi vida. Sin darme cuenta empecé a esperar tus mensajes, a sonreír cuando veía tu nombre en la pantalla y a querer contarte cualquier cosa que me pasara.</p>
                <p>Es curioso cómo alguien puede cambiar tantos días con algo tan simple como una conversación. También me gusta pensar en todo lo que todavía no hemos vivido. Imagino caminatas sin un rumbo fijo, tardes escuchando música, viendo películas, riéndonos por cualquier tontería o simplemente disfrutando del silencio sin que se vuelva incómodo.</p>
                <p>No sueño con una vida perfecta porque sé que eso no existe; sueño con una vida donde estemos juntos, aprendiendo, creciendo y eligiéndonos una y otra vez.</p>
              </div>
            </template>

            <template data-page="5">
              <div class="p-letter">
                <p>Si alguna vez me preguntaran por qué eres tan especial para mí, probablemente no sabría responder con una sola razón. Eres un montón de pequeños detalles que, cuando se juntan, hacen que seas completamente única. Tu forma de hacerme sentir, de escucharme, de entenderme y de estar ahí vale muchísimo para mí.</p>
                <p>Y aunque a veces me cuesta encontrar las palabras correctas, quiero que nunca dudes de algo: desde que llegaste, mi vida se siente mucho más bonita.</p>
                <blockquote class="p-quote">
                  <p>&ldquo;No te amo como si fueras rosa de sal, topacio o flecha de claveles que propagan el fuego: te amo como se aman ciertas cosas oscuras, secretamente, entre la sombra y el alma.&rdquo;</p>
                  <cite>&mdash; Pablo Neruda, Soneto XVII</cite>
                </blockquote>
                <p>A usted le tengo un miedo inmenso de perderla y de perderme en el proceso porque sinceramente no sé qué sería de mí si algún día eso llegara a pasar; es que usted se convirtió en mi tranquilidad, en mi felicidad y en la persona con la que quiero compartir todo lo bueno y también lo malo.</p>
              </div>
            </template>

            <template data-page="6">
              <div class="p-letter">
                <p>Yo la amo muchísimo más de lo que mis palabras pueden explicar, y aunque intente demostrarlo siento que nunca es suficiente, porque usted merece muchísimo más de lo que yo puedo darle, pero aún así quiero seguir esforzándome cada día para hacerla sentir tan amada como usted me hace sentir a mí, porque usted es mi lugar favorito y la persona más importante de mi vida.</p>
                <p>También quiero decirle que para mí usted es la mujer más hermosa que existe y no hay un solo día en el que no piense eso; cada vez que la veo siento que el mundo se detiene un momento porque su sonrisa, sus ojos, su forma de ser y hasta esos pequeños detalles que tal vez usted no nota son las cosas que más me enamoran de usted.</p>
                <p>Quien alguna vez le hizo creer que usted no era hermosa simplemente no sabe apreciar la belleza de verdad, porque yo la veo y no encuentro un solo defecto, solo encuentro razones para seguir enamorándome más.</p>
              </div>
            </template>

            <template data-page="7">
              <div class="p-letter">
                <p>Yo voy a intentar dar absolutamente todo de mí porque no quiero que algún día piense que me faltó amarla o demostrarle lo importante que es para mí. Quiero aprender de mis errores, mejorar por usted y por nosotros, porque lo único que deseo es seguir caminando a su lado.</p>
                <p>Solo le pido que no me deje rendirme, que no me suelte la mano si en algún momento me equivoco, porque jamás habrá un error que signifique que la amo menos; al contrario, cada día que pasa descubro nuevas razones para elegirla otra vez y otra vez.</p>
                <p>Y perdón si me disculpo demasiado, es que a veces mi cabeza me juega en contra y siento que la estoy molestando o que mi manera de actuar no siempre es la mejor; entonces empiezo a pensar demasiado y termino creyendo cosas que probablemente ni siquiera son verdad, pero prefiero pedirle perdón antes que hacerla sentir mal.</p>
                <p>Y por favor, nunca dude de lo que siento, porque la amo con todo lo que soy y con todo lo que tengo, y la voy a seguir amando cada día un poquito más aunque pase el tiempo.</p>
                <p class="p-signature">&mdash; Javi</p>
              </div>
            </template>

            <template data-name="thanks-page">
              <div class="p-thanks-full">
                <div class="thanks-full-deco" aria-hidden="true">
                  <span class="thanks-full-star">&#10022;</span>
                  <span class="thanks-full-star">&#10022;</span>
                  <span class="thanks-full-star">&#10022;</span>
                </div>
                <p class="thanks-full-title">Gracias</p>
                <p class="thanks-full-text">No s&eacute; muy bien por d&oacute;nde empezar, porque las palabras a veces se quedan cortas cuando se trata de agradecer a alguien que ha cambiado tu vida por completo. Pero si hay algo que tengo claro es que cada d&iacute;a a tu lado es un motivo m&aacute;s para sentirme afortunado.</p>
                <p class="thanks-full-text">Gracias por tu sonrisa, esa que ilumina hasta los d&iacute;as m&aacute;s grises y que me recuerda que la felicidad existe en los peque&ntilde;os momentos. Gracias por tu forma de ver la vida, por tu sensibilidad, por tu forma de dibujar emociones en cada trazo y de convertir lo ordinario en extraordinario.</p>
                <p class="thanks-full-text">Admiro tu talento, tu dedicaci&oacute;n, tu forma de esforzarte por lo que amas sin rendirte. Admiro tu inteligencia, tu creatividad, tu manera de hacer sentir especiales a quienes te rodean. No conozco a nadie que tenga tu capacidad para sacar sonrisas incluso en los d&iacute;as dif&iacute;ciles, ni a nadie que haga que los momentos simples se conviertan en recuerdos inolvidables.</p>
                <p class="thanks-full-text">Gracias por ser como eres. Por tu ternura, tu paciencia, tu forma de cuidar sin esperar nada a cambio. Gracias por cada mensaje, cada llamada, cada detalle. Gracias por estar ah&iacute;, incluso cuando la distancia se hace notar.</p>
                <p class="thanks-full-text">Estoy orgulloso de ti. Orgulloso de la persona que eres, de todo lo que construyes, de c&oacute;mo enfrentas la vida con valent&iacute;a y amor. Y ojal&aacute; pudieras verte a trav&eacute;s de mis ojos aunque solo fuera un segundo, para que supieras lo hermosa, valiosa e incre&iacute;ble que eres.</p>
                <p class="thanks-full-text">Gracias por existir. Por cruzarte en mi camino. Por quedarte. Por hacer que mi vida sea mucho m&aacute;s bonita desde que llegaste. Te admiro, te respeto y te amo m&aacute;s de lo que las palabras pueden expresar.</p>
                <p class="thanks-full-signature">&mdash; Con todo mi amor, Javi</p>
                <div class="thanks-full-deco thanks-full-deco--bottom" aria-hidden="true">
                  <span class="thanks-full-heart">&hearts;</span>
                </div>
              </div>
            </template>

                <div class="close-petals" id="close-petals" aria-hidden="true"></div>
              </div>
            </template>
          </div>
        </main>

        <div class="book-edge-right" aria-hidden="true">
          <div class="edge-pages"></div>
        </div>
      </div>

      <button class="book-nav book-nav-prev" id="nav-prev" aria-label="Página anterior" title="Anterior">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="book-nav book-nav-next" id="nav-next" aria-label="Página siguiente" title="Siguiente">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <div id="lightbox" class="lightbox" role="dialog" aria-label="Visor de imagenes" hidden>
      <div class="lb-bg"></div>
      <div class="lb-inner">
        <button class="lb-close" id="lb-close" aria-label="Cerrar visor">&times;</button>
        <button class="lb-nav lb-prev" id="lb-prev" aria-label="Imagen anterior">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="lb-loading" id="lb-loading" aria-hidden="true"></div>
        <img class="lb-img" id="lb-img" src="" alt="Fotografia">
        <button class="lb-nav lb-next" id="lb-next" aria-label="Imagen siguiente">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <span class="lb-counter" id="lb-counter" aria-live="polite"></span>
        <button class="lb-fav" id="lb-fav" aria-label="Añadir favorita">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
      </div>
    </div>

    <audio id="audio" preload="metadata" aria-hidden="true"></audio>
    <audio id="sfx" preload="auto" aria-hidden="true"></audio>
  </div>

</body>
</html>
